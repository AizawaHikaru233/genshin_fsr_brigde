[General]
Name = 原神FSR2桥接插件
Description = 按顺序加载 FSR2 Bridge、OptiScaler 与 ReShade
Developer = Celia
File = FSR-Bridge-Plugin.dll
Version = 1.1.0

[EnableBridge]
Name = 启用 FSR Bridge
Type = bool
Value = 1

[EnableOptiScaler]
Name = 启用 OptiScaler（需要 Bridge）
Type = bool
Value = 1

[EnableReShade]
Name = 启用 ReShade
Type = bool
Value = 1

[BridgePath]
Name = Bridge DLL 路径
Type = string
Value = payload\Bridge\Dx11FsrBridge.dll

[OptiScalerPath]
Name = OptiScaler DLL 路径
Type = string
Value = payload\OptiScaler\OptiScaler.dll

[ReShadePath]
Name = ReShade DLL 路径
Type = string
Value = payload\ReShade\ReShade64.dll

[TriggerModule]
Name = 初始化触发模块
Type = string
Value = WINTRUST.dll

[TimeoutMs]
Name = 等待初始化超时（毫秒）
Type = int
Value = 30000

[RejectGameDirectoryProxies]
Name = 拒绝游戏目录中的重复代理 DLL
Type = bool
Value = 1
