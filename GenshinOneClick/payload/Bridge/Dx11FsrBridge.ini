; 原神 DX11 FSR2 桥接插件正式默认配置
; Genshin DX11 FSR2 Bridge release defaults
; 布尔值：0=关闭/否，1=开启/是。
; Boolean values: 0=off/no, 1=on/yes.
; 修改后需完全重启游戏。RVA 仅适用于当前已验证的游戏版本。
; Restart the game after changes. RVAs are valid only for the verified game build.

[Dx11FsrBridge]

; ===== 核心开关 =====
; ===== Core switches =====

; 启用桥接层总开关。0=关闭，1=启用。程序默认值：1。
; Enables the bridge master switch. 0=off, 1=on. Code default: 1.
Enabled=1

; 控制是否写入 Bridge 日志。0=关闭，1=开启。程序默认值：1。
; Controls Bridge log output. 0=off, 1=on. Code default: 1.
EnableLogging=1

; 仅观察元数据而不接管渲染。0=正常接管，1=仅诊断。程序默认值：0。
; Observes metadata without intercepting rendering. 0=normal interception, 1=diagnostic only. Code default: 0.
CaptureMetadataOnly=0

; ===== 超分接管 =====
; ===== Upscaler interception =====

; 向 OptiScaler 导出 FSR2 接口。0=关闭，1=开启。程序默认值：1。
; Exposes FSR2 exports to OptiScaler. 0=off, 1=on. Code default: 1.
EnableFsr2GetProcAddressShim=1

; 选择 FSR2 转译路径。0=关闭；2=正式 Mode 2，直接替换原 TAAU；3/4=旧 Mode 4 实验路径，不建议使用。
; 程序缺省值为 4；发行包默认值为 2。
; Selects the FSR2 translation path. 0=off; 2=release Mode 2, directly replaces native TAAU; 3/4=legacy Mode 4 experimental paths and are not recommended.
; The code default is 4; the package default is 2.
Fsr2TranslationMode=2

; 控制 Mode 2 的状态跟踪方式。0=完整跟踪每个 TAAU draw，可覆盖技能等不同路径；1=只缓存首个主路径 shader，可能漏掉临时路径。
; 程序默认值：0。
; Controls Mode 2 state tracking. 0=track every TAAU draw, including skill and other paths; 1=cache only the first main-path shader and may miss transient paths.
; Code default: 0.
Fsr2FastStateTracking=0

; 是否阻止不安全的 DX11-on-12 超分后端。0=允许，1=阻止。程序默认值：0。
; Blocks unsafe DX11-on-12 upscaler backends. 0=allow, 1=block. Code default: 0.
BlockDx11On12Upscalers=0

; ===== 运动数据与遮罩 =====
; ===== Motion data and masks =====

; 运动矢量是否已包含抖动。0=未包含，原神正式配置；1=已包含。程序默认值：0。
; Specifies whether motion vectors already include jitter. 0=no, the Genshin release setting; 1=yes. Code default: 0.
Fsr2MotionVectorsJittered=0

; 选择运动矢量缩放符号。0=负向，原神正式配置；1=正向。程序默认值：0。
; Selects the motion-vector scale sign. 0=negative, the Genshin release setting; 1=positive. Code default: 0.
Fsr2MotionVectorScaleMode=0

; 校正 Jitter 坐标。0=不反转；1=仅反转 X；2=仅反转 Y；3=同时反转 X/Y，原神正式配置；4=清零 Jitter。
; 程序默认值：3。
; Corrects Jitter coordinates. 0=no flip; 1=flip X only; 2=flip Y only; 3=flip X/Y, the Genshin release setting; 4=zero Jitter.
; Code default: 3.
Fsr2JitterMode=3

; 是否将 T4 传入为 Reactive Mask。0=不传入，1=传入。程序默认值：1。
; Passes T4 as the Reactive Mask. 0=do not pass, 1=pass. Code default: 1.
Fsr2UseReactiveMask=1

; 是否将 T4 传入为 Transparency/Composition Mask。0=不传入，1=传入。程序默认值：1。
; Passes T4 as the Transparency/Composition Mask. 0=do not pass, 1=pass. Code default: 1.
Fsr2UseTransparencyMask=1

; ===== 色彩与 Mode 4 遗留兼容项 =====
; ===== Color and legacy Mode 4 compatibility =====

; 以下选项在当前 Mode 2 路径中不参与实际处理，仅为旧 Mode 4 回退兼容而保留。
; The following settings are inactive on the current Mode 2 path and are retained only for legacy Mode 4 fallback compatibility.

; 指定输入色彩空间。0=SDR/线性输入，1=HDR10 PQ 输入。程序默认值：0。
; Specifies the input color space. 0=SDR/linear input, 1=HDR10 PQ input. Code default: 0.
Fsr2Hdr10PqColor=0

; 是否使用原生曝光纹理。0=关闭，1=使用。程序默认值：1。
; Uses the native exposure texture. 0=off, 1=use it. Code default: 1.
Fsr2UseNativeExposure=1

; 是否复制原生历史元数据。0=关闭，1=复制。程序默认值：1。
; Copies native history metadata. 0=off, 1=copy. Code default: 1.
Fsr2FastMetadataCopy=1

; 选择临时线性输出格式。0=R16G16B16A16F，1=R11G11B10F。程序默认值：1。
; Selects the temporary linear-output format. 0=R16G16B16A16F, 1=R11G11B10F. Code default: 1.
Fsr2CompactLinearOutput=1

; 是否锁定上游颜色 producer shader。0=不锁定，1=锁定。程序默认值：1。
; Locks the upstream color-producer shader. 0=unlocked, 1=locked. Code default: 1.
Fsr2LockColorProducerShader=1

; 颜色路径变化时是否重置历史。0=不重置，1=重置。程序默认值：1。
; Resets history when the color path changes. 0=no reset, 1=reset. Code default: 1.
Fsr2ResetOnColorPathChange=1

; ===== 帧生成兼容项 =====
; ===== Frame-generation compatibility =====

; 控制 DLSSG 的 DXGI 兼容修复。-1=检测到 DLSSG 时自动启用，0=禁用，1=强制启用。
; 程序默认值：-1。
; Controls the DLSSG DXGI compatibility workaround. -1=enable automatically when DLSSG is detected, 0=off, 1=force on.
; Code default: -1.
DlssgDxgiWorkaround=-1

[RenderScaleMenu]

; ===== 菜单开关 =====
; ===== Menu switch =====

; 启用渲染精度菜单扩展。0=关闭，1=开启。程序默认值：1。
; Enables the render-scale menu extension. 0=off, 1=on. Code default: 1.
Enabled=1

; ===== 已验证游戏版本的地址 =====
; ===== Verified game-build addresses =====

; 地址错误可能导致功能失效或崩溃；除适配新游戏版本外不要修改下列项。
; Wrong addresses may cause failure or crashes; do not edit the following values unless adapting a new game build.

; 原神应用渲染精度函数的模块相对地址。程序默认值：0xADA0900。
; Module-relative address of Genshin's render-scale apply function. Code default: 0xADA0900.
RenderScaleApplyRva=0xADA0900

; 渲染精度字段在对象内的偏移。程序默认值：0x88。
; Offset of the render-scale field within its object. Code default: 0x88.
RenderScaleOffset=0x88

; 原始渲染精度数据的模块相对地址。程序默认值：0x505E5FC。
; Module-relative address of the source render-scale value. Code default: 0x505E5FC.
SourceScaleRva=0x505E5FC

; 渲染精度设置项键指针的模块相对地址。程序默认值：0x52B1180。
; Module-relative address of the render-scale setting-key pointer. Code default: 0x52B1180.
RenderScaleKeyPointerRva=0x52B1180

; 图形选项查找函数的模块相对地址。程序默认值：0x128B8590。
; Module-relative address of the graphics-option lookup function. Code default: 0x128B8590.
GraphicsOptionLookupRva=0x128B8590

; 图形选项索引解析函数的模块相对地址。程序默认值：0xC209120。
; Module-relative address of the graphics-option index resolver. Code default: 0xC209120.
GraphicsIndexResolverRva=0xC209120

; 原神编码浮点数编码函数的模块相对地址。程序默认值：0xA3B56E0。
; Module-relative address of Genshin's encoded-float encoder. Code default: 0xA3B56E0.
EncodedFloatEncoderRva=0xA3B56E0

; 下拉菜单外显值刷新函数的模块相对地址。程序默认值：0x17DE5200。
; Module-relative address of the dropdown displayed-value refresh function. Code default: 0x17DE5200.
DropdownRefreshShownValueRva=0x17DE5200

; ===== 菜单行为 =====
; ===== Menu behavior =====

; 是否运行时扫描并修补标签。0=关闭，正式配置以降低 CPU 开销；1=开启。程序默认值：1。
; Scans and repairs labels at runtime. 0=off, the release setting to reduce CPU overhead; 1=on. Code default: 1.
LabelArrayScannerEnabled=0

; 是否扩展候选档位列表。0=保留原生列表，1=注入 0.2–0.9 和“原生”档。程序默认值：1。
; Extends the candidate scale list. 0=keep the native list, 1=add 0.2–0.9 and Native. Code default: 1.
CandidateListPatchEnabled=1

; 选择档位后是否写入真实渲染精度。0=仅修改菜单，1=实际应用。程序默认值：1。
; Applies the selected scale to the actual renderer. 0=menu only, 1=apply. Code default: 1.
ApplyCandidateSourceScale=1
