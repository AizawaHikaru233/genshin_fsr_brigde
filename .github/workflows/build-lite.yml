name: Build Lite Package

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the generated Lite ZIP to GitHub Releases
        required: true
        default: false
        type: boolean
      release_tag:
        description: Release tag to create or update when publishing (for example v1.0.9)
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Initialize MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build release DLLs for the Lite package
        shell: pwsh
        run: |
          cmake -S .\Dx11FsrBridge -B .\build-package-bridge -G Ninja `
            -DDX11FSRBRIDGE_RELEASE_RUNTIME=ON `
            -DDX11FSRBRIDGE_ENABLE_FSR2_TRANSLATION_EXPERIMENTAL=ON
          cmake --build .\build-package-bridge --config Release
          cmake -S .\AntiPlayerMosaic -B .\build-package-antiplayermosaic -G Ninja
          cmake --build .\build-package-antiplayermosaic --config Release
          $bridgeDll = Get-ChildItem .\build-package-bridge -Recurse -File -Filter Dx11FsrBridge.dll | Select-Object -First 1
          $antiDll = Get-ChildItem .\build-package-antiplayermosaic -Recurse -File -Filter AntiPlayerMosaic.dll | Select-Object -First 1
          if ($null -eq $bridgeDll -or $null -eq $antiDll) { throw 'CMake 未生成必要的 Lite DLL。' }
          Copy-Item $bridgeDll.FullName .\GenshinOneClick\payload\Bridge\Dx11FsrBridge.dll -Force
          Copy-Item $antiDll.FullName .\GenshinOneClick\payload\AntiPlayerMosaic\AntiPlayerMosaic.dll -Force

      - name: Build FPS Unlock Lite package
        shell: pwsh
        run: ./Build-OnlineInstaller.ps1 -Configuration Release -GithubLiteOnly

      - name: Upload FPS Unlock Lite package
        uses: actions/upload-artifact@v4
        with:
          name: GenshinOneClick-Lite-Packages
          path: |
            dist/原神解帧FSR插件包Lite_*.zip
          if-no-files-found: error

      - name: Validate release tag
        if: inputs.publish_release && inputs.release_tag == ''
        shell: pwsh
        run: throw '发布到 Release 时必须填写 release_tag。'

      - name: Publish release
        if: inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/github-release/GenshinFSRBridge.Lite_v*.zip
